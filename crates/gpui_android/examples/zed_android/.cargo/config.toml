# Snapdragon 8 Gen 2 (Cortex-X3 + cores) supports Armv8.2 fullfp16, so enable
# it explicitly. cargo-ndk picks API 24 by default, which predates fullfp16
# being on by default, and `gemm-f16` (pulled in via candle → audio → call →
# git_ui → project_panel) refuses to assemble its `fmla *.8h` SIMD path
# without it.
[target.aarch64-linux-android]
rustflags = ["-C", "target-feature=+fp16"]
