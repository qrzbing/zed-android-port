# Static-link the askpass helper against bionic's libc.a so the binary
# has no dynamic-linker dependency. Required because ssh inside the
# Kali chroot can't resolve `/system/bin/linker64` (lives outside the
# chroot fs); a dynamically-linked bionic binary fails exec with the
# shell's misleading "not found".
#
# The build pulls in NDK's static libc and zero runtime deps, so the
# resulting ELF runs unchanged on bionic host, inside chroot, and
# anywhere else a kernel can exec aarch64.
[target.aarch64-linux-android]
rustflags = ["-C", "target-feature=+crt-static"]
