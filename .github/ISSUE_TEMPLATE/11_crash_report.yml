name: Report a crash (Zdroid)
description: Report a hard crash, ANR, or boot failure of Zdroid.
type: Bug
labels: ["state:needs triage", "crash"]
body:
  - type: markdown
    attributes:
      value: |
        Crash reports help most when they include a tombstone or logcat snippet around the FATAL line. If the app never launched, that's still useful. The system server logs an `am_crash` event with a stack trace.

  - type: input
    attributes:
      label: Zdroid APK version
      placeholder: "v0.X.Y-zdroid (or commit short-sha)"
    validations:
      required: true

  - type: dropdown
    attributes:
      label: When does it crash?
      options:
        - On app launch (never reaches the editor)
        - When opening a project / file
        - In the integrated terminal
        - When switching runtime adapters
        - During a specific editor action (LSP, search, etc.)
        - Random / no consistent trigger
    validations:
      required: true

  - type: input
    attributes:
      label: Device + Android version
      placeholder: "Samsung Tab S9 Ultra, Android 14, One UI 6.1"
    validations:
      required: true

  - type: textarea
    attributes:
      label: Crash signature
      description: |
        Run `adb logcat --pid=$(adb shell pidof com.zdroid)` (or `adb logcat -b crash`) right after the crash. Paste the FATAL block, the Rust panic message, or the SIGSEGV tombstone. 30-50 lines around the failure is the right size.
      render: text
    validations:
      required: true

  - type: textarea
    attributes:
      label: Reproduction steps
      description: Step-by-step from a clean install to the crash.
      placeholder: |
        1. adb install -r app-release.apk
        2. adb shell am start -n com.zdroid/.MainActivity
        3. Wait ~3 seconds, process dies
    validations:
      required: true

  - type: textarea
    attributes:
      label: Additional context
      description: Magisk module version (if chroot), bootstrap version (if bootstrap), free disk space on `/data`, anything else relevant.
    validations:
      required: false
