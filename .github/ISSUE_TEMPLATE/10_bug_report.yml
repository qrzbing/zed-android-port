name: Report a bug (Zdroid)
description: Report a problem with Zdroid (Android port of Zed).
type: Bug
labels: ["state:needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. A few quick notes before you file:

        - **Bugs that also reproduce on desktop Zed** belong [upstream](https://github.com/zed-industries/zed/issues), not here. This repo is the Android port only.
        - Crash dumps go in the **Crash report** template instead of this one.
        - Search existing issues first; if your bug already exists, upvote with a 👍 reaction so it gets triaged faster.

  - type: input
    attributes:
      label: Zdroid APK version
      description: From `Zdroid → Settings → About`, or the GitHub release tag of the APK you installed.
      placeholder: "v0.X.Y-zdroid (or commit short-sha)"
    validations:
      required: true

  - type: dropdown
    attributes:
      label: Runtime adapter
      description: Which adapter is selected in the runtime picker (or `~/etc/zd-runtime.toml`)?
      options:
        - Bootstrap (in-app Termux userland)
        - Kali chroot (zd-spawnd + Magisk module)
        - External Termux app
        - Not configured yet
    validations:
      required: true

  - type: input
    attributes:
      label: Device + Android version
      description: Manufacturer + model + Android version + skin (One UI / HyperOS / stock / etc.).
      placeholder: "Samsung Tab S9 Ultra, Android 14, One UI 6.1"
    validations:
      required: true

  - type: textarea
    attributes:
      label: Reproduction steps
      description: Step-by-step from a clean install or a fresh app launch. The more concrete, the faster this gets fixed.
      placeholder: |
        1. Open Zdroid
        2. Connect a Bluetooth mouse
        3. Open a long file
        4. Two-finger scroll on the trackpad / scroll wheel on the mouse
    validations:
      required: true

  - type: textarea
    attributes:
      label: Current vs. expected behavior
      description: What happens vs. what you expected. Screenshots or short screen recordings really help.
      placeholder: |
        Current: scroll wheel scrolls the file UP when I push the wheel forward.
        Expected: scroll wheel scrolls the file DOWN when I push the wheel forward (matches every other app on the device).
    validations:
      required: true

  - type: textarea
    attributes:
      label: Logcat (if app crashed or misbehaved silently)
      description: |
        Easiest path: enable USB debugging, `adb logcat --pid=$(adb shell pidof com.zdroid)` while reproducing. Paste the relevant 30-50 lines. Filter for `zed_android`, `gpui_android`, `zdroid_runtime`, or `FATAL EXCEPTION` if it's verbose.
      render: text
    validations:
      required: false

  - type: textarea
    attributes:
      label: Additional context
      description: Anything else useful. Magisk module version (if chroot), `pkg list-installed` snippet (if bootstrap), root status, ROM build number.
    validations:
      required: false
