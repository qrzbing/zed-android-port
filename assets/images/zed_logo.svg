<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
<!-- Zdroid orb mark. The original asset shipped here was upstream Zed's
     `Z` glyph; this fork replaces it with the orb-with-rippling-waters
     used as the launcher icon. Single fill colour so gpui's Vector
     component can re-tint via theme.accent / theme.text. Ripples are
     constructed as filled donut paths (even-odd fill rule) rather than
     <circle stroke=...> because gpui's SVG renderer applies tint to
     fill but not to stroke; donuts let every ring respond to the tint. -->

<!-- Outermost ring (faintest, widest radius). -->
<path fill="black" fill-opacity="0.18" fill-rule="evenodd"
    d="M 48,5 A 43,43 0 1 0 48,91 A 43,43 0 1 0 48,5 Z
       M 48,7.5 A 40.5,40.5 0 1 1 48,88.5 A 40.5,40.5 0 1 1 48,7.5 Z" />

<!-- Outer ring. -->
<path fill="black" fill-opacity="0.32" fill-rule="evenodd"
    d="M 48,13 A 35,35 0 1 0 48,83 A 35,35 0 1 0 48,13 Z
       M 48,16 A 32,32 0 1 1 48,80 A 32,32 0 1 1 48,16 Z" />

<!-- Mid ring. -->
<path fill="black" fill-opacity="0.50" fill-rule="evenodd"
    d="M 48,21 A 27,27 0 1 0 48,75 A 27,27 0 1 0 48,21 Z
       M 48,25 A 23,23 0 1 1 48,71 A 23,23 0 1 1 48,25 Z" />

<!-- Inner ring. -->
<path fill="black" fill-opacity="0.72" fill-rule="evenodd"
    d="M 48,30 A 18,18 0 1 0 48,66 A 18,18 0 1 0 48,30 Z
       M 48,34 A 14,14 0 1 1 48,62 A 14,14 0 1 1 48,34 Z" />

<!-- Halo around the orb. -->
<path fill="black" fill-opacity="0.88" fill-rule="evenodd"
    d="M 48,37 A 11,11 0 1 0 48,59 A 11,11 0 1 0 48,37 Z
       M 48,40 A 8,8 0 1 1 48,56 A 8,8 0 1 1 48,40 Z" />

<!-- Orb core, fully filled. -->
<circle cx="48" cy="48" r="5" fill="black" />
</svg>
